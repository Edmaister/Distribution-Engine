[pytest]
testpaths = test
pythonpath = .

addopts =
    -q
    -ra
    --disable-warnings
    --maxfail=1
    --cov=services
    --cov=apps
    --cov=utils
    --cov-report=term-missing

norecursedirs =
    .git
    .venv
    venv
    __pycache__
    test/retired
    test/_retired
    tests/retired
    tests/_retired

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

markers =
    integration: marks tests as integration (deselect with '-m "not integration"')
    unit: marks tests as unit tests
    e2e: end-to-end tests