global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/monitoring/prometheus/prometheus-recording-rules.yml
  - /etc/prometheus/monitoring/prometheus/alert_rules.yml

scrape_configs:
  - job_name: "referral-engine"
    static_configs:
      - targets: ["host.docker.internal:8000"]  # if running in Docker