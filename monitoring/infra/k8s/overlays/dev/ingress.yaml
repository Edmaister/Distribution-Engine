apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: referrals-api
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: dev-referrals.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dev-referrals-api
                port: { number: 8000 }
