{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "referrals.fullname" . }}-migrations-{{ now | date "20060102150405" }}
  labels:
    {{- include "referrals.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ default 1 .Values.migrations.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "referrals.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: APP_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "referrals.fullname" . }}-secrets
                  key: APP_DB_DSN
            - name: LOG_LEVEL
              value: "{{ .Values.env.LOG_LEVEL }}"
          command: ["/bin/sh", "-lc"]
          args:
            - >
              python scripts/init_db.py
              {{- if .Values.migrations.applySeeds }} && python scripts/seed_db.py {{- end }}
{{- end }}
